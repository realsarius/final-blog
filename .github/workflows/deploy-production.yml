name: Deploy Production (Manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Deploy edilecek branch veya tag"
        required: true
        default: "main"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      TARGET_REF: ${{ inputs.ref }}

    steps:
      - name: Validate required secrets
        run: |
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST secret is missing" && exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER secret is missing" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "DEPLOY_PATH secret is missing" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" || (echo "DEPLOY_SSH_PRIVATE_KEY secret is missing" && exit 1)
          if [ -z "$DEPLOY_PORT" ]; then
            echo "DEPLOY_PORT secret not set, defaulting to 22"
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; \
            cd '$DEPLOY_PATH'; \
            git fetch --all --tags --prune; \
            git checkout '$TARGET_REF'; \
            if git show-ref --verify --quiet 'refs/remotes/origin/$TARGET_REF'; then \
              git pull --ff-only origin '$TARGET_REF'; \
            fi; \
            docker compose --env-file .env.prod --profile prod config >/dev/null; \
            docker compose --env-file .env.prod --profile prod pull; \
            docker compose --env-file .env.prod --profile prod up -d --build; \
            docker compose --env-file .env.prod --profile prod ps"

      - name: Post-deploy smoke (server side)
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; \
            cd '$DEPLOY_PATH'; \
            echo 'Deploy sonrası ilk 30 saniye bekleniyor...'; \
            sleep 30; \
            for i in \$(seq 1 24); do \
              if curl -fsS http://localhost:3007/robots.txt >/dev/null && curl -fsS http://localhost:3007/login >/dev/null; then \
                echo 'Smoke checks passed.'; \
                exit 0; \
              fi; \
              echo \"Uygulama henüz hazır değil (\$i/24), 5 saniye bekleniyor...\"; \
              sleep 5; \
            done; \
            echo 'Smoke checks zaman aşımına uğradı. Servis durumu ve web logları:'; \
            docker compose --env-file .env.prod --profile prod ps; \
            docker compose --env-file .env.prod --profile prod logs --tail=120 blog-web-prod; \
            exit 1"
