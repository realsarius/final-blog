name: Security Audit

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Audit High And Critical
        run: npm run audit:high
