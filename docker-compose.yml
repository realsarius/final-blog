services:
  blog-web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: blog-web-dev
    profiles:
      - dev
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DATABASE_DEV_USER}:${DATABASE_DEV_PASSWORD}@postgres-dev:5432/${DATABASE_DEV_NAME}?schema=public
      WATCHPACK_POLLING: "true"
    ports:
      - "3007:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis:
        condition: service_healthy

  blog-web-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-web-prod
    profiles:
      - prod
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DATABASE_PROD_USER}:${DATABASE_PROD_PASSWORD}@postgres-prod:5432/${DATABASE_PROD_NAME}?schema=public
    ports:
      - "127.0.0.1:3007:3000"
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    profiles:
      - dev
      - test
      - prod
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-dev:
    image: postgres:16-alpine
    container_name: blog-db-dev
    profiles:
      - dev
    ports:
      - "${DATABASE_DEV_PORT:-5438}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_DEV_NAME}
      POSTGRES_USER: ${DATABASE_DEV_USER}
      POSTGRES_PASSWORD: ${DATABASE_DEV_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_DEV_USER} -d ${DATABASE_DEV_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-test:
    image: postgres:16-alpine
    container_name: blog-db-test
    profiles:
      - test
    ports:
      - "${DATABASE_TEST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_TEST_NAME}
      POSTGRES_USER: ${DATABASE_TEST_USER}
      POSTGRES_PASSWORD: ${DATABASE_TEST_PASSWORD}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_TEST_USER} -d ${DATABASE_TEST_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-prod:
    image: postgres:16-alpine
    container_name: blog-db-prod
    profiles:
      - prod
    ports:
      - "127.0.0.1:${DATABASE_PROD_PORT:-15434}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_PROD_NAME}
      POSTGRES_USER: ${DATABASE_PROD_USER}
      POSTGRES_PASSWORD: ${DATABASE_PROD_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_PROD_USER} -d ${DATABASE_PROD_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: blog-pgadmin
    profiles:
      - dev
    depends_on:
      - postgres-dev
    ports:
      - "5052:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_dev_data:
  postgres_test_data:
  postgres_prod_data:
  pgadmin_data:
  redis_data:
